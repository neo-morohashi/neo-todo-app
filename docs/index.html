<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NEO TODO</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <meta name="theme-color" content="#dc4c3e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NEO TODO">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <div id="busy-indicator"></div>

  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>NEO TODO</h1>
    </div>
    <nav id="tags-nav"></nav>
  </div>

  <div id="main">
    <div id="main-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button id="menu-btn" onclick="toggleSidebar()" title="メニュー">☰</button>
        <h2 id="main-title">すべて</h2>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button id="settings-btn" onclick="openSettings()" title="GitHub接続設定">⚙</button>
        <div id="sort-bar" class="sort-bar">
          <button class="sort-btn" data-sort="manual" onclick="setSort('manual')" title="自分で並び替え（ドラッグで順番変更）">⠿<span class="hide-mobile"> 並び替え</span></button>
          <button class="sort-btn" data-sort="added" onclick="setSort('added')" title="追加した順（古い順）">追加</button>
          <button class="sort-btn" data-sort="due" onclick="setSort('due')" title="期限が早い順">期限</button>
          <button class="sort-btn" data-sort="priority" onclick="setSort('priority')" title="優先度 P1→P4">優先</button>
          <button class="sort-btn" data-sort="tag" onclick="setSort('tag')" title="タグでグルーピング">タグ</button>
        </div>
        <button id="add-btn" onclick="openAddModal()">+ 追加</button>
      </div>
    </div>
    <div id="task-list"></div>
  </div>

  <!-- Add Task Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2>タスクを追加</h2>
      <input id="new-name" type="text" placeholder="タスク名">
      <div class="tag-edit-block">
        <label>タグ（タップで追加/削除）</label>
        <div id="new-tags-chips" class="tags-chips"></div>
        <input id="new-tag-input" type="text" placeholder="新しいタグ名 → Enter">
      </div>
      <div class="row">
        <select id="new-priority">
          <option value="">優先度なし</option>
          <option value="P1">P1</option>
          <option value="P2">P2</option>
          <option value="P3">P3</option>
          <option value="P4">P4</option>
        </select>
        <input id="new-due" type="date">
      </div>
      <div class="modal-actions">
        <button onclick="closeModal()">キャンセル</button>
        <button class="primary" onclick="addTask()">追加</button>
      </div>
    </div>
  </div>

  <!-- Edit Task Modal -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-box">
      <h2>タスクを編集</h2>
      <input id="edit-name" type="text">
      <div class="tag-edit-block">
        <label>タグ（タップで追加/削除）</label>
        <div id="edit-tags-chips" class="tags-chips"></div>
        <input id="edit-tag-input" type="text" placeholder="新しいタグ名 → Enter">
      </div>
      <div class="row">
        <select id="edit-priority">
          <option value="">優先度なし</option>
          <option value="P1">P1</option>
          <option value="P2">P2</option>
          <option value="P3">P3</option>
          <option value="P4">P4</option>
        </select>
        <input id="edit-due" type="date">
      </div>
      <div class="modal-actions">
        <button onclick="closeEditModal()">キャンセル</button>
        <button class="primary" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <!-- Settings (PAT) Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-box">
      <h2>GitHub 接続設定</h2>
      <p class="settings-help">
        neo-todo データを読み書きするには <b>GitHub Personal Access Token</b> が必要です。<br>
        <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">PATを発行</a> →
        Repository access: <code>neo-morohashi/neo-todo</code> → Permissions: <code>Contents: Read and write</code>
      </p>
      <input id="settings-token" type="password" placeholder="ghp_... もしくは github_pat_...">
      <div id="settings-error" class="settings-error"></div>
      <div class="modal-actions">
        <button class="danger" onclick="logoutSettings()">PAT削除</button>
        <button class="primary" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>

  <button id="fab" onclick="openAddModal()">+</button>

  <script type="module" src="app.js?v=3"></script>
</body>
</html>
